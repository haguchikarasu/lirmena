<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- OGP・メタ情報
       - theme-color は CSS 変数と2箇所で管理。変更時は両方合わせること
       - og:image は public/img/ogp.png（1200×630px 推奨）
       - og:description は設定しない
       - contents.html にも同じ OGP 設定が必要
  -->
  <meta name="theme-color" content="#080808" />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="ja_JP" />
  <meta property="og:title" content="作品タイトル" />
  <meta property="og:url" content="" /><!-- TODO: デプロイ時にサイトの URL を設定すること -->
  <meta property="og:image" content="public/img/ogp.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <title>作品タイトル</title>
  <link rel="stylesheet" href="index.css" />
</head>
<body class="idx-page">
  <!-- ヒーローエリア -->
  <div class="idx-hero">
    <img src="public/img/title01.png" alt="タイトル" class="idx-hero-img" />
  </div>

  <!-- ep・sec 一覧エリア（index.ts が動的生成） -->
  <section class="idx-body" aria-label="エピソード一覧">
    <p class="idx-sec-label">E P I S O D E</p>
    <div id="episodes-area" class="idx-ep-list">
      <p class="loading-text">読み込み中…</p>
    </div>
  </section>

  <!-- 栞エリア（index.ts が動的生成） -->
  <section class="idx-body idx-bm-section" aria-label="栞">
    <p class="idx-sec-label">栞</p>
    <div id="bookmark-slots">
      <!-- index.ts が動的生成 -->
    </div>
  </section>

  <!-- 右下 FAB メニュー（index.ts が操作） -->
  <div id="fab-container">
    <ul id="fab-panel" hidden role="menu" aria-label="メニュー">
      <!-- index.ts が動的生成 -->
    </ul>
    <button id="fab-toggle" class="idx-fab" type="button" aria-label="メニューを開く" aria-expanded="false">☰</button>
  </div>

  <!-- 設定ポップアップ（index.ts が操作） -->
  <div id="settings-popup" hidden role="dialog" aria-label="設定" aria-modal="true">
    <!-- index.ts が動的生成 -->
  </div>

  <script type="module" src="src/index.ts"></script>
</body>
</html>
