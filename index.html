<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- OGP・メタ情報
       - theme-color は CSS 変数と2箇所で管理。変更時は両方合わせること
       - og:image は public/ogp.png（1200×630px 推奨）
       - og:description は設定しない
       - 本文・タイトルの各シェル（public/contents/*.html）にも同じ OGP 設定を揃える
  -->
  <meta name="theme-color" content="#080808" />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="ja_JP" />
  <meta property="og:title" content="輝くもの《リルメナ》" />
  <meta property="og:url" content="https://haguchikarasu.github.io/lirmena/" />
  <meta property="og:image" content="https://haguchikarasu.github.io/lirmena/ogp.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <title>輝くもの《リルメナ》</title>
  <!-- 書字方向・端末カテゴリの早期反映（FOUC 回避）：CSS 適用前に <html> 属性を先付け。
       - data-writing-mode: axis.ts/settings.ts と同じ lirmena.writingMode キー。保存値が無ければ既定＝横書き
       - data-device:      matchMedia('(pointer: coarse)') の代理指標で PC/SP を先付け。device.ts が同じロジックで購読・更新 -->
  <script>
    try {
      var m = localStorage.getItem('lirmena.writingMode');
      document.documentElement.setAttribute('data-writing-mode', m === 'vertical' ? 'vertical' : 'horizontal');
    } catch (e) {}
    try {
      var d = window.matchMedia && window.matchMedia('(pointer: coarse)').matches ? 'sp' : 'pc';
      document.documentElement.setAttribute('data-device', d);
    } catch (e) {}
  </script>
  <link rel="stylesheet" href="index.css" />
  <!-- Google tag (gtag.js)：本番ホストでのみ計測（dev/draft/エディタのプレビュー・?noga 付きは送らない） -->
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    var blockGA = location.hostname !== 'haguchikarasu.github.io'
               || new URLSearchParams(location.search).has('noga');
    if (!blockGA) {
      var s = document.createElement('script');
      s.async = true;
      s.src = 'https://www.googletagmanager.com/gtag/js?id=G-D750N4MKZY';
      document.head.appendChild(s);
      gtag('js', new Date());
      gtag('config', 'G-D750N4MKZY');
    }
  </script>
</head>
<body class="idx-page">
  <!-- ヒーローエリア -->
  <div class="idx-hero">
    <div class="idx-hero-card">
      <img src="public/cover/vol01.avif" alt="タイトル" class="idx-hero-img" />
    </div>
    <div class="idx-version-badges">
      <span id="badge-content-version" class="idx-version-badge"></span>
      <span id="badge-site-version" class="idx-version-badge"></span>
    </div>
  </div>

  <!-- 続きから読む（オートセーブがある時だけ index.ts が hidden を外す） -->
  <button id="idx-resume" class="idx-resume" type="button" hidden>続きから読む</button>

  <!-- ep・sec 一覧エリア（index.ts が動的生成） -->
  <section class="idx-body" aria-label="エピソード一覧">
    <div id="episodes-area" class="idx-ep-list">
      <p class="loading-text">読み込み中…</p>
    </div>
  </section>

  <!-- 栞エリア（index.ts が動的生成） -->
  <section class="idx-body idx-bm-section" aria-label="栞">
    <p class="idx-sec-label">栞</p>
    <div id="bookmark-slots">
      <!-- index.ts が動的生成 -->
    </div>
  </section>

  <!-- 更新履歴エリア（index.ts が動的生成） -->
  <section id="content-changelog" class="idx-body">
    <h2 class="idx-sec-label">コンテンツ更新履歴</h2>
    <ul id="content-changelog-list">
      <!-- index.ts が動的に生成 -->
    </ul>
    <button id="content-changelog-toggle" hidden>すべて表示</button>
  </section>

  <!-- 右下 FAB メニュー（index.ts が操作） -->
  <div id="fab-container">
    <ul id="fab-panel" hidden role="menu" aria-label="メニュー">
      <!-- index.ts が動的生成 -->
    </ul>
    <button id="fab-toggle" class="idx-fab" type="button" aria-label="メニューを開く" aria-expanded="false">☰</button>
  </div>

  <!-- 設定ポップアップ（index.ts が操作） -->
  <div id="settings-popup" hidden role="dialog" aria-label="設定" aria-modal="true">
    <!-- index.ts が動的生成 -->
  </div>

  <!-- 共有ポップアップ（index.ts が操作） -->
  <div id="share-popup" hidden role="dialog" aria-label="共有" aria-modal="true">
    <!-- index.ts が動的生成 -->
  </div>

  <script type="module" src="src/index.ts"></script>
</body>
</html>
