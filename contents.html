<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- OGP・メタ情報（index.html と同じ設定。変更時は両方合わせること） -->
  <meta name="theme-color" content="#2d5a3d" />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="ja_JP" />
  <meta property="og:image" content="public/img/ogp.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <title>輝くもの《リルメナ》</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ローディング（main.ts が hidden を付与して非表示にする） -->
  <div id="loading"><span>読み込み中</span></div>

  <!-- 背景レイヤー（bg.ts が操作） -->
  <div id="bg-layer" aria-hidden="true"></div>

  <!-- タイトル画面（renderer.ts が動的部分を更新・hidden を切り替える。scene 0 のみ表示） -->
  <div id="title-screen" hidden>
    <div id="title-screen-header">
      <p id="title-screen-ep-title"></p>
      <button id="btn-title-enter" type="button">本文を読む</button>
      <button id="btn-title-prev" type="button">前のエピソードへ</button>
      <a id="btn-title-index" href="index.html">目次へ戻る</a>
      <div id="title-screen-changelog"></div>
    </div>
  </div>

  <!-- メインコンテナ（renderer.ts が hidden を切り替える。scene >= 1 のみ表示） -->
  <div id="main-container">
    <!-- エリアA: 戻るボタンコンテナ（right端・reading-start）。nav.ts が #btn-prev を querySelector で取得 -->
    <div id="btn-container-start" class="btn-container">
      <button id="btn-prev" type="button" aria-label="前へ" tabindex="2">›</button>
    </div>

    <!-- エリアC: 本文表示エリア（renderer.ts が内容を生成） -->
    <div id="scene-content" hidden></div>

    <!-- エリアD: 進行ボタンコンテナ（left端・reading-end）。nav.ts が #btn-next を querySelector で取得 -->
    <div id="btn-container-end" class="btn-container">
      <button id="btn-next" type="button" aria-label="次へ" tabindex="1">‹</button>
    </div>
  </div>

  <!-- 進捗バー（progress.ts が操作） -->
  <div id="progress-bar" aria-hidden="true">
    <div id="progress-fill"></div>
  </div>

  <!-- 右下ナビゲーションメニュー（menu.ts が操作） -->
  <div id="menu-container">
    <button id="menu-toggle" type="button" aria-label="メニューを開く" aria-expanded="false">
      ☰
    </button>
    <div id="menu-panel" hidden>
      <!-- メニュー項目は menu.ts が生成 -->
    </div>
  </div>

  <!-- 設定ポップアップ（settings.ts が操作） -->
  <div id="settings-popup" hidden role="dialog" aria-label="設定">
    <!-- 設定項目は settings.ts が生成 -->
  </div>

  <!-- 暗転オーバーレイ（transition.ts が操作） -->
  <div id="transition-overlay" aria-hidden="true"></div>

  <!-- キャラクター紹介ポップアップ（menu.ts が操作） -->
  <div id="characters-overlay" hidden>
    <div id="characters-popup">
      <button id="characters-popup-close">閉じる</button>
      <div id="characters-list">
        <!-- menu.ts が動的に生成 -->
      </div>
    </div>
  </div>

  <!-- エラー表示（main.ts が操作） -->
  <p id="error-message" hidden role="alert"></p>

  <script type="module" src="src/main.ts"></script>
</body>
</html>
