<!DOCTYPE html>
<!-- 【自動生成テンプレ／編集はここ】本文ページ（sec≥1）／巻末あとがきページ（vol[XX]-afterword.html）の雛形。
     vite.config.ts の pages() プラグインが public/story.json を読み、{{bodyAttrs}} に本文モードは
     `data-ep="X" data-sec="Y"`、あとがきモードは `data-vol="X" data-kind="afterword"` を埋めて
     contents/[ep]-[sec].html または contents/vol[XX]-afterword.html を build/serve 両方で生成する。
     生成物は触らず、この雛形を直す。
     CSS は main.ts が import './styles/index.css' でバンドルし、Vite が <link>（ハッシュ名）を自動注入する（手書き link は置かない）。 -->
<!-- class="at-opening"：開幕（本文先頭の黒い余白）を初期状態に。opening.ts が本文に入ると外す -->
<html lang="ja" class="at-opening">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- OGP・メタ情報（作品名で静的固定・全ページ共通。og:image は public/ogp.png、og:description は設定しない。
       theme-color は CSS 変数 --theme-color と2箇所で管理） -->
  <meta name="theme-color" content="#080808" />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="ja_JP" />
  <meta property="og:title" content="輝くもの《リルメナ》" />
  <meta property="og:url" content="https://haguchikarasu.github.io/lirmena/" />
  <meta property="og:image" content="https://haguchikarasu.github.io/lirmena/ogp.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <title>輝くもの《リルメナ》</title>
  <!-- favicon は vol ごとに切替（vol 下に帰属）。pages() プラグインが {{faviconHref}} をそのページの vol の
       favicon 相対パスへ埋める。あとがきページは vol[XX]-afterword.html＝そのページの vol の物を使う -->
  <link rel="icon" href="{{faviconHref}}" />
  <!-- FOUC 回避（背景色の白フラッシュ対策）：本体 CSS が到着する前の一瞬に真っ白が見えるのを防ぐため、
       body 背景と文字色だけをインラインで先付ける。値は _base.css の html/body ルール（--theme-color=#080808）と一致。
       Vite が注入する本体 CSS の link 要素は pages() プラグインで script より前に移動するが、fetch 完了までの
       極短時間だけ UA デフォルト（白）が見えるのを、この保険で黒に倒す。 -->
  <style>html,body{margin:0;background:#080808;color:#e8e0d0;}</style>
  <!-- 書字方向・端末カテゴリ・物語進行段階（stage）の早期反映（FOUC 回避）：CSS 適用前に <html> 属性を先付け。
       保存値が無ければ既定＝横書き／stage1（緑）。axis.ts/settings.ts と同じ lirmena.writingMode キー、
       stage は main.ts が読了記録後に localStorage 'lirmena.storyStage' へキャッシュする（1〜5 の文字列）。 -->
  <script>
    try {
      var m = localStorage.getItem('lirmena.writingMode');
      document.documentElement.setAttribute('data-writing-mode', m === 'vertical' ? 'vertical' : 'horizontal');
    } catch (e) {}
    try {
      var d = window.matchMedia && window.matchMedia('(pointer: coarse)').matches ? 'sp' : 'pc';
      document.documentElement.setAttribute('data-device', d);
    } catch (e) {}
    try {
      var stg = localStorage.getItem('lirmena.storyStage');
      document.documentElement.setAttribute('data-story-stage', stg && /^[1-5]$/.test(stg) ? stg : '1');
    } catch (e) {}
  </script>
  <!-- Google tag (gtag.js)：本番ホストでのみ計測（dev/draft/エディタのプレビュー・?noga 付きは送らない） -->
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    var blockGA = location.hostname !== 'haguchikarasu.github.io'
               || new URLSearchParams(location.search).has('noga');
    if (!blockGA) {
      var s = document.createElement('script');
      s.async = true;
      s.src = 'https://www.googletagmanager.com/gtag/js?id=G-D750N4MKZY';
      document.head.appendChild(s);
      gtag('js', new Date());
      gtag('config', 'G-D750N4MKZY');
    }
  </script>
</head>
<body {{bodyAttrs}}>
  <!-- ローディング（main.ts が hidden を付与して非表示にする） -->
  <p id="loading" role="status">読み込み中</p>

  <!-- 背景レイヤースタック（bg.ts が .bg-layer を生成しクロスフェードする。presentational） -->
  <div id="bg-stack" aria-hidden="true"></div>

  <!-- メインコンテナ（本文ページの読書エリア A/C/D） -->
  <main id="main-container">
    <nav id="btn-container-start" class="btn-container"></nav>
    <article id="scene-content" hidden></article>
    <nav id="btn-container-end" class="btn-container">
      <button id="btn-next" type="button" aria-label="次へ" tabindex="1">次へ</button>
      <!-- 巻末sec 本文ページの「次へ」の後ろに出す「◯巻あとがき」ボタン。
           本文モードで自 vol の巻末公開 sec かつ story.json の当 vol afterword.published=true のとき、
           nav.ts が hidden を外して当 vol のあとがきページへ遷移する。あとがきページでは常に hidden。
           label は nav.ts が state.getCurrentVolume().volume を元に「第◯巻あとがき」に差し替える。 -->
      <button id="btn-afterword" type="button" tabindex="2" hidden></button>
      <div id="btn-share-group" hidden>
        <p id="btn-share-heading">感想を届ける</p>
        <div id="btn-share-row">
          <a id="btn-share-x" class="is-text-label" href="#" target="_blank" rel="noopener noreferrer">Ｘでポスト</a>
          <a id="btn-share-marshmallow" class="is-text-label" href="#" target="_blank" rel="noopener noreferrer">マシュマロを送る</a>
        </div>
      </div>
    </nav>
  </main>

  <!-- 進捗バー（progress.ts が操作。presentational・Phase 2 で配線） -->
  <div id="progress-bar" aria-hidden="true" hidden>
    <div id="progress-fill"></div>
  </div>

  <!-- 開幕アフォーダンス（opening.ts が操作。<html>.at-opening のときだけ CSS で表示） -->
  <aside id="opening-affordance">
    <p id="opening-label"></p>
    <button id="opening-back" type="button">もどる</button>
    <button id="opening-start" type="button">読み進める</button>
  </aside>

  <!-- 右下ナビゲーションメニュー（menu.ts が操作） -->
  <nav id="menu-container">
    <button id="menu-toggle" type="button" aria-label="メニューを開く" aria-expanded="false">☰</button>
    <div id="menu-panel" hidden></div>
  </nav>

  <!-- 設定ポップアップ（settings.ts が操作） -->
  <section id="settings-popup" hidden role="dialog" aria-label="設定"></section>

  <!-- 共有ポップアップ（menu.ts が操作） -->
  <section id="share-popup" hidden role="dialog" aria-label="共有"></section>

  <!-- 栞ポップアップ：スロット選択（menu.ts が操作） -->
  <section id="bookmark-popup" hidden role="dialog" aria-label="栞に保存"></section>

  <!-- 読み方（読書点）チュートリアル：初回ガイドのカルーセル。中身（案内役立ち絵＋説明＋CSS図解）は
       tutorial.ts が STEPS から生成する。デバイス×書字方向は html[data-device][data-writing-mode] で CSS が解決 -->
  <section id="tutorial-popup" hidden role="dialog" aria-label="読み方"></section>
  <div id="reading-anchor" aria-hidden="true" hidden></div>

  <!-- 暗転オーバーレイ（transition.ts が .fading をトグル。class="fading" 初期値＝到着フェードイン用） -->
  <div id="transition-overlay" class="fading" aria-hidden="true"></div>

  <!-- キャラクター紹介ポップアップ（menu.ts が操作） -->
  <section id="characters-overlay" hidden>
    <article id="characters-popup">
      <button id="characters-popup-close">閉じる</button>
      <div id="characters-list"></div>
    </article>
  </section>

  <!-- エラー表示（main.ts が操作） -->
  <p id="error-message" hidden role="alert"></p>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
