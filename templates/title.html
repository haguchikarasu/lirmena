<!DOCTYPE html>
<!-- 【自動生成テンプレ／編集はここ】タイトルページ（sec=0）の雛形。src/plugins/pages.ts が episodes.json を読み、
     {{ep}} / {{sec}} を埋めて contents/[ep]-00.html を build/serve 両方で生成する。生成物は触らず、この雛形を直す。
     CSS は title.ts が import './styles/index.css' でバンドルし、Vite が <link>（ハッシュ名）を自動注入する（手書き link は置かない）。 -->
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- OGP・メタ情報（作品名で静的固定・全ページ共通。og:image は public/ogp.png、og:description は設定しない。
       theme-color は CSS 変数 --theme-color と2箇所で管理） -->
  <meta name="theme-color" content="#080808" />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="ja_JP" />
  <meta property="og:title" content="輝くもの《リルメナ》" />
  <meta property="og:url" content="https://haguchikarasu.github.io/lirmena/" />
  <meta property="og:image" content="https://haguchikarasu.github.io/lirmena/ogp.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <title>輝くもの《リルメナ》</title>
  <link rel="icon" href="/favicon.ico" />
  <!-- FOUC 回避（背景色の白フラッシュ対策）：本体 CSS が到着する前の一瞬に真っ白が見えるのを防ぐため、
       body 背景と文字色だけをインラインで先付ける。値は _base.css の html/body ルール（--theme-color=#080808）と一致。
       Vite が注入する本体 CSS の link 要素は pages() プラグインで script より前に移動するが、fetch 完了までの
       極短時間だけ UA デフォルト（白）が見えるのを、この保険で黒に倒す。 -->
  <style>html,body{margin:0;background:#080808;color:#e8e0d0;}</style>
  <!-- 書字方向・端末カテゴリの早期反映（FOUC 回避）：CSS 適用前に <html> 属性を先付け。
       保存値が無ければ既定＝横書き。axis.ts/settings.ts と同じ lirmena.writingMode キー -->
  <script>
    try {
      var m = localStorage.getItem('lirmena.writingMode');
      document.documentElement.setAttribute('data-writing-mode', m === 'vertical' ? 'vertical' : 'horizontal');
    } catch (e) {}
    try {
      var d = window.matchMedia && window.matchMedia('(pointer: coarse)').matches ? 'sp' : 'pc';
      document.documentElement.setAttribute('data-device', d);
    } catch (e) {}
  </script>
  <!-- Google tag (gtag.js)：本番ホストでのみ計測（dev/draft/エディタのプレビュー・?noga 付きは送らない） -->
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    var blockGA = location.hostname !== 'haguchikarasu.github.io'
               || new URLSearchParams(location.search).has('noga');
    if (!blockGA) {
      var s = document.createElement('script');
      s.async = true;
      s.src = 'https://www.googletagmanager.com/gtag/js?id=G-D750N4MKZY';
      document.head.appendChild(s);
      gtag('js', new Date());
      gtag('config', 'G-D750N4MKZY');
    }
  </script>
</head>
<body data-ep="{{ep}}" data-sec="{{sec}}">
  <!-- 背景レイヤー（CSS の黒背景フォールバック。title.ts が backgroundImage を設定） -->
  <div id="bg-layer" aria-hidden="true"></div>

  <!-- タイトル画面（title.ts が内容を生成し hidden を解除する）
       タイトル・ボタン群（nav）・更新履歴は src/styles/_title.css で #title-screen 基準に絶対配置し、
       縦位置を4つの CSS 変数で独立調整する（中央を背景の絵に空ける）。 -->
  <section id="title-screen" hidden>
    <p id="title-screen-ep-title"></p>
    <nav id="title-screen-nav">
      <button id="btn-title-enter" type="button">本文を読む</button>
      <button id="btn-title-prev" type="button">前のエピソードへ</button>
      <a id="btn-title-index" href="../index.html">目次へ戻る</a>
    </nav>
    <section id="title-screen-changelog"></section>
  </section>

  <!-- 暗転オーバーレイ（transition.ts が .fading をトグル。class="fading" 初期値＝到着フェードイン用） -->
  <div id="transition-overlay" class="fading" aria-hidden="true"></div>

  <!-- エラー表示（title.ts が操作） -->
  <p id="error-message" hidden role="alert"></p>

  <script type="module" src="/src/title.ts"></script>
</body>
</html>
